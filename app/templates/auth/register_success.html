<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Successful — AIDP</title>
  
  <!-- Critical inline CSS for immediate render -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0b0f1a 0%, #1a1f2e 100%);
      color: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .success-container {
      max-width: 500px;
      width: 100%;
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid rgba(79, 142, 247, 0.3);
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      animation: scaleIn 0.6s ease 0.2s both;
    }
    
    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #4f8ef7, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .redirect-message {
      font-size: 0.9rem;
      color: #4f8ef7;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(79, 142, 247, 0.3);
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .manual-link {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #4f8ef7, #6366f1);
      color: #fff;
      text-decoration: none;
      border-radius: 99px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(79, 142, 247, 0.35);
    }
    
    .manual-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(79, 142, 247, 0.5);
    }
    
    @media (max-width: 768px) {
      .success-container {
        padding: 36px 24px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-icon">✓</div>
    <h1>Account Created Successfully!</h1>
    <p>Your account has been created. You can now sign in with your credentials.</p>
    
    <div class="redirect-message">
      <div class="spinner"></div>
      <span>Redirecting to login page...</span>
    </div>
    
    <a href="{{ login_url }}" class="manual-link" id="manualLink">Go to Login Page</a>
  </div>
  
  <script>
    // Log for debugging
    console.log('[REGISTER SUCCESS] Page loaded');
    console.log('[REGISTER SUCCESS] Redirecting to login in 2 seconds');
    
    // Redirect after 2 seconds
    setTimeout(function() {
      console.log('[REGISTER SUCCESS] Redirecting now...');
      window.location.href = '{{ login_url }}';
    }, 2000);
    
    // Also make manual link work immediately
    document.getElementById('manualLink').addEventListener('click', function(e) {
      console.log('[REGISTER SUCCESS] Manual link clicked');
    });
  </script>
</body>
</html>
