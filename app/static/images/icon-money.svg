<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moneyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer glow circle -->
  <circle cx="24" cy="24" r="22" fill="url(#moneyGrad)" opacity="0.08"/>
  <!-- Main coin -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="url(#moneyGrad)" stroke-width="2.5"/>
  <!-- Dollar symbol -->
  <text x="24" y="30" font-size="24" font-weight="bold" fill="url(#moneyGrad)" text-anchor="middle" font-family="Arial, sans-serif">$</text>
  <!-- Decorative rings -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="url(#moneyGrad)" stroke-width="1" opacity="0.3"/>
</svg>
