<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="24" cy="24" r="23" fill="url(#logoGradient)" opacity="0.15" stroke="url(#logoGradient)" stroke-width="1.5"/>
  
  <!-- Globe circle -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="url(#logoGradient)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Globe grid lines -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="url(#logoGradient)" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="24" cy="24" rx="18" ry="6" fill="none" stroke="url(#logoGradient)" stroke-width="0.8" opacity="0.4"/>
  <path d="M 6 24 Q 24 18 42 24 Q 24 30 6 24" fill="none" stroke="url(#logoGradient)" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Upward arrow inside globe -->
  <g transform="translate(24, 24)">
    <!-- Arrow shaft -->
    <line x1="0" y1="8" x2="0" y2="-6" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M -3 -2 L 0 -8 L 3 -2" fill="none" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="12" cy="12" r="1.5" fill="url(#logoGradient)" opacity="0.8"/>
  <circle cx="36" cy="12" r="1.5" fill="url(#logoGradient)" opacity="0.8"/>
  <circle cx="12" cy="36" r="1.5" fill="url(#logoGradient)" opacity="0.8"/>
  <circle cx="36" cy="36" r="1.5" fill="url(#logoGradient)" opacity="0.8"/>
  
  <!-- Center accent dot -->
  <circle cx="24" cy="24" r="2" fill="url(#logoGradient)"/>
</svg>
