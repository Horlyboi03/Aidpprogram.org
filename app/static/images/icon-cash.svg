<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#cashGrad)" opacity="0.1"/>
  <!-- Main card -->
  <rect x="10" y="14" width="28" height="20" rx="2" fill="none" stroke="url(#cashGrad)" stroke-width="2"/>
  <!-- Dollar sign -->
  <text x="24" y="30" font-size="16" font-weight="bold" fill="url(#cashGrad)" text-anchor="middle" font-family="Arial">$</text>
  <!-- Decorative line -->
  <line x1="10" y1="20" x2="38" y2="20" stroke="url(#cashGrad)" stroke-width="1" opacity="0.5"/>
</svg>
