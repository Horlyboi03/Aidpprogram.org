<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoBrandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:1" />
    </linearGradient>
    <filter id="brandGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="20" cy="20" r="19" fill="url(#logoBrandGradient)" opacity="0.12" stroke="url(#logoBrandGradient)" stroke-width="1"/>
  
  <!-- Main globe circle -->
  <circle cx="20" cy="20" r="15" fill="none" stroke="url(#logoBrandGradient)" stroke-width="1.8" filter="url(#brandGlow)"/>
  
  <!-- Globe grid lines -->
  <circle cx="20" cy="20" r="15" fill="none" stroke="url(#logoBrandGradient)" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="20" cy="20" rx="15" ry="5" fill="none" stroke="url(#logoBrandGradient)" stroke-width="0.6" opacity="0.3"/>
  <path d="M 5 20 Q 20 16 35 20 Q 20 24 5 20" fill="none" stroke="url(#logoBrandGradient)" stroke-width="0.6" opacity="0.3"/>
  
  <!-- Upward arrow inside globe -->
  <g transform="translate(20, 20)">
    <!-- Arrow shaft -->
    <line x1="0" y1="6" x2="0" y2="-4" stroke="url(#logoBrandGradient)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M -2 -1 L 0 -6 L 2 -1" fill="none" stroke="url(#logoBrandGradient)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="10" cy="10" r="1" fill="url(#logoBrandGradient)" opacity="0.7"/>
  <circle cx="30" cy="10" r="1" fill="url(#logoBrandGradient)" opacity="0.7"/>
  <circle cx="10" cy="30" r="1" fill="url(#logoBrandGradient)" opacity="0.7"/>
  <circle cx="30" cy="30" r="1" fill="url(#logoBrandGradient)" opacity="0.7"/>
  
  <!-- Center accent dot -->
  <circle cx="20" cy="20" r="1.2" fill="url(#logoBrandGradient)"/>
  
  <!-- Circular text path -->
  <defs>
    <path id="circlePath" d="M 20, 20 m -14, 0 a 14,14 0 1,1 28,0 a 14,14 0 1,1 -28,0" fill="none"/>
  </defs>
  
  <!-- Circular AIDP text -->
  <text font-size="7" font-weight="bold" fill="url(#logoBrandGradient)" letter-spacing="2" opacity="0.9">
    <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
      AIDP • AIDP • AIDP •
    </textPath>
  </text>
</svg>
