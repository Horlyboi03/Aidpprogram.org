  <rect x="22" y="17" width="4" height="4" fill="none" stroke="url(#rentGrad)" stroke-width="1"/>
  <rect x="29" y="17" width="4" height="4" fill="none" stroke="url(#rentGrad)" stroke-width="1"/>
  <rect x="15" y="24" width="4" height="4" fill="none" stroke="url(#rentGrad)" stroke-width="1"/>
  <rect x="22" y="24" width="4" height="4" fill="none" stroke="url(#rentGrad)" stroke-width="1"/>
  <rect x="29" y="24" width="4" height="4" fill="none" stroke="url(#rentGrad)" stroke-width="1"/>
  <!-- Door -->
