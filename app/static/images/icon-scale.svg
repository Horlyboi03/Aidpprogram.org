<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f8ef7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer glow circle -->
  <circle cx="24" cy="24" r="22" fill="url(#scaleGrad)" opacity="0.08"/>
  <!-- Main circle -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="url(#scaleGrad)" stroke-width="2.5"/>
  <!-- Scale beam -->
  <line x1="14" y1="24" x2="34" y2="24" stroke="url(#scaleGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan -->
  <rect x="12" y="26" width="8" height="6" rx="1" fill="none" stroke="url(#scaleGrad)" stroke-width="2"/>
  <!-- Right pan -->
  <rect x="28" y="26" width="8" height="6" rx="1" fill="none" stroke="url(#scaleGrad)" stroke-width="2"/>
  <!-- Left support -->
  <line x1="16" y1="24" x2="16" y2="26" stroke="url(#scaleGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Right support -->
  <line x1="32" y1="24" x2="32" y2="26" stroke="url(#scaleGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="24" cy="24" r="2" fill="url(#scaleGrad)"/>
  <!-- Decorative accent -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="url(#scaleGrad)" stroke-width="1" opacity="0.3"/>
</svg>
